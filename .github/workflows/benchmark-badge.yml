name: Benchmark

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run benchmarks
        run: go test -bench=. -benchmem -benchtime=3s -count=1 ./... | tee bench.txt

      - name: Store results and detect regression
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: go
          output-file-path: bench.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          # Fail if any benchmark is more than 50% slower than the stored baseline
          alert-threshold: '150%'
          fail-on-alert: true
          comment-on-alert: false
          benchmark-data-dir-path: benchmarks
