name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, 'feat/**', 'feature/**', 'refactor/**', 'bugfix/**', 'fix/**', 'chore/**']
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.github/instructions/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.github/instructions/**'

jobs:
  lint-test:
    name: lint-test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TEST_COUNT: ${{ (github.ref == 'refs/heads/main' || github.base_ref == 'main') && '100' || '10' }}
      TEST_TIMEOUT: ${{ (github.ref == 'refs/heads/main' || github.base_ref == 'main') && '300s' || '120s' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Download modules
        run: go mod download
      - name: fmt
        run: |
          test -z "$(gofmt -l .)" || (echo "formatting issues — run 'make fmt'"; exit 1)
          test -z "$(go run golang.org/x/tools/cmd/goimports@latest -local github.com/maxence2997 -l .)" || (echo "import issues — run 'make fmt'"; exit 1)
      - name: lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
      - name: test
        run: go test -v -race -count=${{ env.TEST_COUNT }} -timeout ${{ env.TEST_TIMEOUT }} ./...

  check:
    name: check
    runs-on: ubuntu-latest
    needs: [lint-test]
    if: always()
    steps:
      - name: gate
        run: |
          if [[ "${{ needs.lint-test.result }}" != "success" ]]; then
            echo "lint-test did not succeed (result: ${{ needs.lint-test.result }})"
            exit 1
          fi
